<svg viewBox="0 0 400 420" class="avatar-svg" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Colores de piel -->
    <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d0b0"/>
      <stop offset="100%" stop-color="#e8b896"/>
    </linearGradient>
    
    <!-- CONTORNO BLANDO - Glow suave dorado -->
    <filter id="softOutline" x="-30%" y="-30%" width="160%" height="160%">
      <!-- Desenfoque para el borde suave -->
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <!-- Color del contorno -->
      <feFlood flood-color="#c9a86a" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <!-- Sombra más difusa -->
      <feGaussianBlur in="shadow" stdDeviation="4" result="shadowBlur"/>
      <!-- Combinar con original -->
      <feMerge>
        <feMergeNode in="shadowBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Contorno extra suave para elementos individuales -->
    <filter id="elementGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feFlood flood-color="#e8c987" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════ -->
  <!-- GRUPO PRINCIPAL CON CONTORNO BLANDO   -->
  <!-- Todo el avatar envuelto para el outline -->
  <!-- ═══════════════════════════════════════ -->
  <g filter="url(#softOutline)">
    
    <!-- Sombra del suelo -->
    <ellipse cx="200" cy="405" rx="110" ry="10" fill="#000" opacity="0.08">
      <animate attributeName="rx" values="110;105;110" dur="3s" repeatCount="indefinite"/>
    </ellipse>

    <!-- ═══════════════════════════════════════ -->
    <!-- SILLA                                   -->
    <!-- ═══════════════════════════════════════ -->
    <g id="chair">
      <rect x="130" y="180" width="140" height="120" rx="15" fill="#4a5568" opacity="0.9"/>
      <rect x="135" y="185" width="130" height="110" rx="12" fill="#718096"/>
    </g>

    <!-- ═══════════════════════════════════════ -->
    <!-- CUERPO / TORSO                         -->
    <!-- ═══════════════════════════════════════ -->
    <g id="torso">
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 0 -1.5; 0 0" dur="3s" repeatCount="indefinite"/>
      
      <!-- Cuello -->
      <rect x="185" y="175" width="30" height="25" fill="url(#skinGrad)"/>
      
      <!-- Playera oscura -->
      <path d="M140 195 Q200 185 260 195 L265 340 L135 340 Z" fill="#1a202c"/>
      
      <!-- Cuello de la polera -->
      <ellipse cx="200" cy="195" rx="28" ry="10" fill="#2d3748"/>
      <ellipse cx="200" cy="195" rx="22" ry="7" fill="#1a202c"/>
      
      <!-- Hombros -->
      <ellipse cx="150" cy="210" rx="25" ry="18" fill="#1a202c"/>
      <ellipse cx="250" cy="210" rx="25" ry="18" fill="#1a202c"/>
      
      <!-- Mangas -->
      <rect x="125" y="210" width="35" height="80" rx="10" fill="#1a202c" transform="rotate(8 142 250)"/>
      <rect x="240" y="210" width="35" height="80" rx="10" fill="#1a202c" transform="rotate(-8 257 250)"/>
      
      <!-- Puños -->
      <rect x="128" y="285" width="30" height="15" rx="5" fill="#2d3748"/>
      <rect x="242" y="285" width="30" height="15" rx="5" fill="#2d3748"/>
    </g>

    <!-- ═══════════════════════════════════════ -->
    <!-- CABEZA                                  -->
    <!-- ═══════════════════════════════════════ -->
    <g id="head">
      <animateTransform attributeName="transform" type="rotate"
        values="0 200 140; 1.5 200 140; 0 200 140; -1.5 200 140; 0 200 140"
        dur="6s" repeatCount="indefinite"/>
      
      <!-- Orejas -->
      <ellipse cx="155" cy="145" rx="10" ry="14" fill="url(#skinGrad)"/>
      <ellipse cx="245" cy="145" rx="10" ry="14" fill="url(#skinGrad)"/>
      
      <!-- Cara -->
      <rect x="160" y="95" width="80" height="95" rx="30" fill="url(#skinGrad)"/>
      
      <!-- Frente -->
      <rect x="165" y="100" width="70" height="35" rx="15" fill="url(#skinGrad)"/>
      
      <!-- Sombra barbilla -->
      <path d="M170 175 Q200 188 230 175" stroke="#d4a574" stroke-width="2" fill="none" opacity="0.4"/>
      
      <!-- Mejillas -->
      <ellipse cx="172" cy="155" rx="10" ry="6" fill="#e8a87c" opacity="0.2"/>
      <ellipse cx="228" cy="155" rx="10" ry="6" fill="#e8a87c" opacity="0.2"/>
      
      <!-- Nariz -->
      <path d="M198 145 L195 158 L205 158 Z" fill="#d4a574" opacity="0.6"/>
      <path d="M195 158 Q200 162 205 158" stroke="#c4956a" stroke-width="1.5" fill="none"/>
      
      <!-- Cejas -->
      <path d="M172 118 Q182 113 192 118" stroke="#2d3748" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M208 118 Q218 113 228 118" stroke="#2d3748" stroke-width="3" fill="none" stroke-linecap="round"/>
      
      <!-- OJOS con parpadeo -->
      <g id="eyes">
        <ellipse cx="182" cy="132" rx="9" ry="10" fill="#fff"/>
        <circle cx="182" cy="132" r="5" fill="#2d3748"/>
        <circle cx="184" cy="130" r="2" fill="#fff"/>
        <rect x="172" y="121" width="20" height="22" fill="url(#skinGrad)" opacity="0">
          <animate attributeName="opacity" values="0;0;0;1;0;0" keyTimes="0;0.88;0.92;0.94;0.96;1" dur="4s" repeatCount="indefinite"/>
        </rect>
        
        <ellipse cx="218" cy="132" rx="9" ry="10" fill="#fff"/>
        <circle cx="218" cy="132" r="5" fill="#2d3748"/>
        <circle cx="220" cy="130" r="2" fill="#fff"/>
        <rect x="208" y="121" width="20" height="22" fill="url(#skinGrad)" opacity="0">
          <animate attributeName="opacity" values="0;0;0;1;0;0" keyTimes="0;0.88;0.92;0.94;0.96;1" dur="4s" repeatCount="indefinite"/>
        </rect>
      </g>
      
      <!-- GAFAS -->
      <g id="glasses">
        <rect x="168" y="122" width="28" height="20" rx="6" fill="none" stroke="#2d3748" stroke-width="2.5"/>
        <rect x="204" y="122" width="28" height="20" rx="6" fill="none" stroke="#2d3748" stroke-width="2.5"/>
        <line x1="196" y1="132" x2="204" y2="132" stroke="#2d3748" stroke-width="2.5"/>
        <line x1="168" y1="132" x2="155" y2="128" stroke="#2d3748" stroke-width="1.5"/>
        <line x1="232" y1="132" x2="245" y2="128" stroke="#2d3748" stroke-width="1.5"/>
        <line x1="172" y1="126" x2="180" y2="126" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
        <line x1="208" y1="126" x2="216" y2="126" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
      </g>
      
      <!-- BARBA -->
      <g id="beard">
        <path d="M165 155 Q165 190 200 195 Q235 190 235 155 L235 145 Q235 175 200 180 Q165 175 165 145 Z" fill="#2d3748"/>
        <path d="M185 165 Q200 160 215 165 Q215 172 200 170 Q185 172 185 165 Z" fill="#2d3748"/>
        <rect x="195" y="158" width="10" height="8" rx="3" fill="#2d3748"/>
        <path d="M190 185 Q200 190 210 185" stroke="#4a5568" stroke-width="1" fill="none" opacity="0.5"/>
      </g>
      
      <!-- BOCA -->
      <path d="M192 172 Q200 177 208 172" stroke="#c53030" stroke-width="2" fill="none" stroke-linecap="round"/>
      
      <!-- PELO -->
      <g id="hair">
        <path d="M158 115 Q158 75 200 70 Q242 75 242 115 L242 100 Q242 65 200 60 Q158 65 158 100 Z" fill="#1a202c"/>
        <path d="M162 85 Q175 78 200 80 Q225 78 238 85 Q225 92 200 88 Q175 92 162 85 Z" fill="#2d3748"/>
        <rect x="155" y="95" width="8" height="30" rx="3" fill="#1a202c"/>
        <rect x="237" y="95" width="8" height="30" rx="3" fill="#1a202c"/>
        <path d="M185 65 L195 55 L205 65 L215 58 L220 68" stroke="#1a202c" stroke-width="6" fill="none" stroke-linecap="round"/>
      </g>
    </g>

    <!-- ═══════════════════════════════════════ -->
    <!-- MANOS (tipeando)                        -->
    <!-- ═══════════════════════════════════════ -->
    <g id="hands">
      <g>
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 0 -2; 0 0; 0 1; 0 0" dur="0.3s" repeatCount="indefinite"/>
        <ellipse cx="145" cy="310" rx="14" ry="10" fill="url(#skinGrad)"/>
        <rect x="138" y="303" width="4" height="8" rx="2" fill="url(#skinGrad)"/>
        <rect x="143" y="301" width="4" height="10" rx="2" fill="url(#skinGrad)"/>
        <rect x="148" y="303" width="4" height="8" rx="2" fill="url(#skinGrad)"/>
      </g>
      <g>
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 0 1; 0 0; 0 -2; 0 0" dur="0.3s" begin="0.15s" repeatCount="indefinite"/>
        <ellipse cx="255" cy="310" rx="14" ry="10" fill="url(#skinGrad)"/>
        <rect x="248" y="303" width="4" height="8" rx="2" fill="url(#skinGrad)"/>
        <rect x="253" y="301" width="4" height="10" rx="2" fill="url(#skinGrad)"/>
        <rect x="258" y="303" width="4" height="8" rx="2" fill="url(#skinGrad)"/>
      </g>
    </g>

        <!-- ═══════════════════════════════════════ -->
    <!-- LAPTOP                                  -->
    <!-- ═══════════════════════════════════════ -->
    <g id="laptop">
      <!-- Base -->
      <rect x="130" y="305" width="140" height="8" rx="2" fill="#a0aec0"/>
      <rect x="130" y="305" width="140" height="3" rx="1" fill="#cbd5e0"/>
      
      <!-- Teclado -->
      <rect x="135" y="302" width="130" height="5" rx="1" fill="#4a5568"/>
      <g fill="#718096">
        <rect x="140" y="303" width="6" height="3" rx="0.5">
          <animate attributeName="fill" values="#718096;#63b3ed;#718096" dur="0.2s" repeatCount="indefinite"/>
        </rect>
        <rect x="148" y="303" width="6" height="3" rx="0.5">
          <animate attributeName="fill" values="#718096;#63b3ed;#718096" dur="0.25s" begin="0.05s" repeatCount="indefinite"/>
        </rect>
        <rect x="156" y="303" width="6" height="3" rx="0.5">
          <animate attributeName="fill" values="#718096;#63b3ed;#718096" dur="0.3s" begin="0.1s" repeatCount="indefinite"/>
        </rect>
        <rect x="164" y="303" width="6" height="3" rx="0.5">
          <animate attributeName="fill" values="#718096;#63b3ed;#718096" dur="0.22s" begin="0.15s" repeatCount="indefinite"/>
        </rect>
        <rect x="172" y="303" width="6" height="3" rx="0.5">
          <animate attributeName="fill" values="#718096;#63b3ed;#718096" dur="0.28s" begin="0.02s" repeatCount="indefinite"/>
        </rect>
        <rect x="180" y="303" width="6" height="3" rx="0.5">
          <animate attributeName="fill" values="#718096;#63b3ed;#718096" dur="0.2s" begin="0.08s" repeatCount="indefinite"/>
        </rect>
        <rect x="188" y="303" width="6" height="3" rx="0.5">
          <animate attributeName="fill" values="#718096;#63b3ed;#718096" dur="0.26s" begin="0.12s" repeatCount="indefinite"/>
        </rect>
        <rect x="196" y="303" width="6" height="3" rx="0.5">
          <animate attributeName="fill" values="#718096;#63b3ed;#718096" dur="0.24s" begin="0.18s" repeatCount="indefinite"/>
        </rect>
        <rect x="204" y="303" width="6" height="3" rx="0.5">
          <animate attributeName="fill" values="#718096;#63b3ed;#718096" dur="0.3s" begin="0.07s" repeatCount="indefinite"/>
        </rect>
        <rect x="212" y="303" width="6" height="3" rx="0.5">
          <animate attributeName="fill" values="#718096;#63b3ed;#718096" dur="0.22s" begin="0.14s" repeatCount="indefinite"/>
        </rect>
        <rect x="220" y="303" width="6" height="3" rx="0.5">
          <animate attributeName="fill" values="#718096;#63b3ed;#718096" dur="0.28s" begin="0.03s" repeatCount="indefinite"/>
        </rect>
        <rect x="228" y="303" width="6" height="3" rx="0.5">
          <animate attributeName="fill" values="#718096;#63b3ed;#718096" dur="0.2s" begin="0.11s" repeatCount="indefinite"/>
        </rect>
        <rect x="236" y="303" width="6" height="3" rx="0.5">
          <animate attributeName="fill" values="#718096;#63b3ed;#718096" dur="0.25s" begin="0.16s" repeatCount="indefinite"/>
        </rect>
        <rect x="244" y="303" width="6" height="3" rx="0.5">
          <animate attributeName="fill" values="#718096;#63b3ed;#718096" dur="0.3s" begin="0.09s" repeatCount="indefinite"/>
        </rect>
        <rect x="252" y="303" width="6" height="3" rx="0.5">
          <animate attributeName="fill" values="#718096;#63b3ed;#718096" dur="0.23s" begin="0.13s" repeatCount="indefinite"/>
        </rect>
      </g>
      
      <rect x="190" y="306" width="20" height="2" rx="1" fill="#718096" opacity="0.5"/>
      
      <!-- Pantalla (tapa de laptop) -->
      <rect x="140" y="220" width="120" height="85" rx="4" fill="#2d3748"/>
      
      <!-- Pantalla negra -->
      <rect x="144" y="224" width="112" height="77" rx="2" fill="#1a202c"/>
      
      <!-- Fondo azul oscuro de la pantalla -->
      <rect x="146" y="226" width="108" height="73" fill="#1e3a5f" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.7;0.9" dur="2s" repeatCount="indefinite"/>
      </rect>
      
      <!-- LOGO APPLE CLÁSICO EN EL CENTRO -->
      <g transform="translate(200, 262)">
        <!-- Brillo pulsante detrás -->
        <circle cx="0" cy="0" r="22" fill="#fff" opacity="0.08">
          <animate attributeName="opacity" values="0.08;0.15;0.08" dur="3s" repeatCount="indefinite"/>
        </circle>
        <!-- Manzana con mordida -->
        <path d="M0 -14
                 C-6 -14, -11 -9, -11 -3
                 C-11 4, -6 10, 0 13
                 C6 10, 11 4, 11 -3
                 C11 -9, 6 -14, 0 -14
                 Z
                 M0 -16
                 C1 -18, 2 -19, 3 -19
                 C3 -21, 1 -21, 0 -20
                 C-1 -21, -3 -21, -3 -19
                 C-2 -19, -1 -18, 0 -16
                 Z" 
              fill="#fff" opacity="0.85"/>
        <!-- Mordida (círculo que corta) -->
        <circle cx="5.5" cy="-8" r="4.2" fill="#1e3a5f"/>
      </g>
    </g>
    
    <!-- Monitor extra -->
    <g id="monitor" transform="translate(290, 240)">
      <rect x="15" y="55" width="20" height="5" rx="1" fill="#a0aec0"/>
      <rect x="20" y="40" width="10" height="15" fill="#718096"/>
      <rect x="0" y="0" width="50" height="40" rx="3" fill="#2d3748"/>
      <rect x="2" y="2" width="46" height="36" rx="2" fill="#1a202c"/>
      <rect x="5" y="5" width="15" height="2" rx="1" fill="#63b3ed" opacity="0.6"/>
      <rect x="5" y="9" width="10" height="2" rx="1" fill="#63b3ed" opacity="0.6"/>
      <rect x="5" y="13" width="20" height="2" rx="1" fill="#63b3ed" opacity="0.6"/>
      <rect x="5" y="17" width="12" height="2" rx="1" fill="#63b3ed" opacity="0.6"/>
      <rect x="5" y="21" width="18" height="2" rx="1" fill="#63b3ed" opacity="0.6"/>
      <rect x="25" y="5" width="12" height="2" rx="1" fill="#90cdf4" opacity="0.5"/>
      <rect x="25" y="9" width="18" height="2" rx="1" fill="#90cdf4" opacity="0.5"/>
      <rect x="25" y="13" width="8" height="2" rx="1" fill="#90cdf4" opacity="0.5"/>
    </g>

    <!-- Taza de café -->
    <g id="coffee" transform="translate(60, 315)">
      <animateTransform attributeName="transform" type="translate"
        values="60 315; 60 313; 60 315" dur="4s" repeatCount="indefinite"/>
      <rect x="0" y="0" width="18" height="20" rx="3" fill="#e8c987"/>
      <ellipse cx="9" cy="0" rx="9" ry="3" fill="#c9a86a"/>
      <ellipse cx="9" cy="0" rx="7" ry="2" fill="#6b4423"/>
      <path d="M18 5 Q24 5 24 10 Q24 15 18 15" stroke="#e8c987" stroke-width="2" fill="none"/>
      <path d="M5 -5 Q8 -12 5 -18" stroke="#fff" stroke-width="1" fill="none" opacity="0">
        <animate attributeName="opacity" values="0;0.3;0" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="d" values="M5 -5 Q8 -12 5 -18;M5 -8 Q2 -15 5 -22;M5 -5 Q8 -12 5 -18" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M12 -3 Q15 -10 12 -16" stroke="#fff" stroke-width="1" fill="none" opacity="0">
        <animate attributeName="opacity" values="0;0.2;0" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- Libros -->
    <g id="books" transform="translate(330, 320)">
      <rect x="0" y="14" width="28" height="6" rx="1" fill="#8a1f1f"/>
      <rect x="2" y="7" width="24" height="7" rx="1" fill="#2d3748"/>
      <rect x="1" y="0" width="26" height="7" rx="1" fill="#c9a86a"/>
      <line x1="4" y1="10" x2="22" y2="10" stroke="#718096" stroke-width="0.5"/>
      <line x1="4" y1="17" x2="22" y2="17" stroke="#718096" stroke-width="0.5"/>
    </g>

    <!-- Planta -->
    <g id="plant" transform="translate(30, 290)">
      <path d="M5 30 L10 50 L30 50 L35 30 Z" fill="#c9a86a"/>
      <ellipse cx="20" cy="30" rx="15" ry="4" fill="#a68b4b"/>
      <path d="M20 30 Q10 10 5 15 Q10 25 20 30" fill="#48bb78"/>
      <path d="M20 30 Q20 5 20 8 Q22 20 20 30" fill="#38a169"/>
      <path d="M20 30 Q30 10 35 15 Q30 25 20 30" fill="#48bb78"/>
      <path d="M20 30 Q15 15 12 18 Q16 25 20 30" fill="#2f855a"/>
    </g>

  </g> <!-- FIN DEL GRUPO CON CONTORNO BLANDO -->

</svg>