<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portafolio — Legislación Educativa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <base target="_blank">
</head>

<body>

  <div class="toolbar">
    <button class="btn btn-notebook" id="btnNotebook">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M2 4h7a2 2 0 0 1 2 2v14a1 1 0 0 0-1-1H2z" />
        <path d="M22 4h-7a2 2 0 0 0-2 2v14a1 1 0 0 1 1-1h8z" />
      </svg>
      Modo Cuaderno
    </button>

    <button class="btn btn-gallery" id="btnGallery">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <rect x="3" y="3" width="18" height="18" rx="2" />
        <circle cx="8.5" cy="8.5" r="1.5" />
        <polyline points="21 15 16 10 5 21" />
      </svg>
      Galería
    </button>
  </div>



  <nav class="toc-sidebar" id="tocSidebar">
    <ul class="toc-list" id="tocList"></ul>
  </nav>

  <div class="page-wrapper" id="pageWrapper">

  </div>

  <!-- Visor del Modo Cuaderno -->
  <div class="notebook-overlay" id="notebookOverlay">

    <!-- Barra superior compacta con todo los controles -->
    <div class="notebook-topbar">
      <div class="notebook-topbar-left">
        <button class="notebook-close" id="notebookClose" aria-label="Cerrar modo cuaderno">✕</button>
        <span class="notebook-page-label-top" id="notebookPageLabel"></span>
      </div>
      <div class="notebook-topbar-center">
        <button class="notebook-nav" id="notebookPrev" aria-label="Página anterior">‹</button>
        <span class="notebook-page-count" id="notebookPageCount"></span>
        <button class="notebook-nav" id="notebookNext" aria-label="Página siguiente">›</button>
      </div>
    </div>

    <!-- Stage: ocupa todo el espacio restante -->
    <div class="notebook-stage">
      <div class="notebook-book-wrap" id="notebookBookWrap">
        <div class="notebook-spine"></div>
        <div class="notebook-page-content" id="notebookPageContent"></div>
        <div class="notebook-page-flip" id="notebookPageFlip"></div>
      </div>
    </div>

  </div>



  <div class="carousel-overlay" id="carouselOverlay">
    <div class="carousel-topbar">
      <span class="carousel-counter" id="carouselCounter"></span>
      <button class="carousel-close" id="carouselClose">✕</button>
    </div>
    <div class="carousel-stage">
      <button class="carousel-btn" id="carouselPrev">‹</button>
      <div class="carousel-img-wrap">
        <img id="carouselImg" src="" alt="">
      </div>
      <button class="carousel-btn" id="carouselNext">›</button>
    </div>
    <p class="carousel-caption" id="carouselCaption"></p>
  </div>

  <script type="module" src="js/main.js"></script>

  <button class="btn-top" id="btnTop" title="Ir al inicio">
    ↑
  </button>

</body>

</html>
