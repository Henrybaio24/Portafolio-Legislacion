<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portafolio — Legislación Educativa</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <base target="_blank">
</head>

<body>

  <!-- ═══════════════════════════════════════ -->
  <!-- TOOLBAR                                 -->
  <!-- ═══════════════════════════════════════ -->
  <div class="toolbar" id="toolbar">

    <button class="btn btn-notebook" id="btnNotebook">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M2 4h7a2 2 0 0 1 2 2v14a1 1 0 0 0-1-1H2z" />
        <path d="M22 4h-7a2 2 0 0 0-2 2v14a1 1 0 0 1 1-1h8z" />
      </svg>
      Modo Revista
    </button>

    <button class="btn btn-notebook" id="btnGallery">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <rect x="3" y="3" width="18" height="18" rx="2" />
        <circle cx="8.5" cy="8.5" r="1.5" />
        <polyline points="21 15 16 10 5 21" />
      </svg>
      Galería
    </button>
  </div>


  <!-- ═══════════════════════════════════════ -->
  <!-- TOC LATERAL                             -->
  <!-- ═══════════════════════════════════════ -->
  <nav class="toc-sidebar" id="tocSidebar">
    <ul class="toc-list" id="tocList"></ul>
  </nav>


  <!-- ═══════════════════════════════════════ -->
  <!-- AVATAR DE BIENVENIDA                    -->
  <!-- ═══════════════════════════════════════ -->
  <div class="welcome-avatar" id="welcomeAvatar">
    <button class="welcome-avatar-close" id="welcomeAvatarClose" aria-label="Cerrar">✕</button>

    <div class="welcome-avatar-portrait" id="avatarContainer"></div>

    <div class="welcome-avatar-bubble">
      <div class="bubble-header">
        <span class="bubble-dot"></span>
        <span class="bubble-dot"></span>
        <span class="bubble-dot"></span>
      </div>
      <div class="bubble-body">
        <p class="bubble-line">Bienvenido a mi</p>
        <p class="bubble-line">portafolio académico.</p>
        <p class="bubble-line bubble-name">Henry Montenegro</p>
        <span class="bubble-cursor">_</span>
      </div>
    </div>
  </div>

  <div class="author-info" id="authorInfo">
    <div class="author-text">
      <span>Realizado por <strong>Henry Montenegro</strong></span>
      <span class="author-repo">El contenido de este portafolio lo puede encontrar en el siguiente repositorio</span>
    </div>
    <a href="https://github.com/Henrybaio24/Portafolio-Legislacion" target="_blank" rel="noopener noreferrer"
      class="author-github" title="Ver código en GitHub">
      <svg class="github-icon" viewBox="0 0 24 24" fill="currentColor">
        <path
          d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
      </svg>
    </a>
  </div>


  <!-- ═══════════════════════════════════════ -->
  <!-- CONTENIDO PRINCIPAL                     -->
  <!-- ═══════════════════════════════════════ -->
  <div class="page-wrapper" id="pageWrapper"></div>


  <!-- ═══════════════════════════════════════ -->
  <!-- OVERLAY: MODO CUADERNO                  -->
  <!-- ═══════════════════════════════════════ -->
  <div class="notebook-overlay" id="notebookOverlay">
    <div class="notebook-topbar">
      <div class="notebook-topbar-left">
        <span class="notebook-page-label-top" id="notebookPageLabel"></span>
      </div>
      <div class="notebook-topbar-center">
        <button class="notebook-nav" id="notebookPrev" aria-label="Página anterior">‹</button>
        <span class="notebook-page-count" id="notebookPageCount"></span>
        <button class="notebook-nav" id="notebookNext" aria-label="Página siguiente">›</button>
      </div>
      <div class="notebook-topbar-right">
        <button class="notebook-close" id="notebookClose" aria-label="Cerrar modo cuaderno">✕</button>
      </div>
    </div>

    <div class="notebook-stage">
      <div class="notebook-book-wrap" id="notebookBookWrap">
        <div class="notebook-spine"></div>
        <div class="notebook-page-content" id="notebookPageContent"></div>
        <div class="notebook-page-flip" id="notebookPageFlip"></div>
      </div>
    </div>
  </div>


  <!-- ═══════════════════════════════════════ -->
  <!-- OVERLAY: CARRUSEL                       -->
  <!-- ═══════════════════════════════════════ -->
  <div class="carousel-overlay" id="carouselOverlay">
    <div class="carousel-topbar">
      <span class="carousel-counter" id="carouselCounter"></span>
      <button class="carousel-close" id="carouselClose">✕</button>
    </div>
    <div class="carousel-stage">
      <button class="carousel-btn" id="carouselPrev">‹</button>
      <div class="carousel-img-wrap">
        <img id="carouselImg" src="" alt="">
      </div>
      <button class="carousel-btn" id="carouselNext">›</button>
    </div>
    <p class="carousel-caption" id="carouselCaption"></p>
  </div>


  <!-- ═══════════════════════════════════════ -->
  <!-- SCRIPTS                                 -->
  <!-- ═══════════════════════════════════════ -->
  <script type="module" src="js/main.js"></script>


  <!-- ═══════════════════════════════════════ -->
  <!-- BOTÓN IR AL INICIO                      -->
  <!-- ═══════════════════════════════════════ -->
  <button class="btn-top" id="btnTop" title="Ir al inicio">↑</button>

</body>

</html>
